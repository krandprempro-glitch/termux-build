name: Build TerLinux APK (Complete)

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      debug:
        description: 'Build debug APK'
        required: false
        default: 'true'
      release:
        description: 'Build release APK'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [aarch64, armv7a, i686, x86_64]
      fail-fast: false
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: |
          platforms;android-34
          build-tools;34.0.0
          ndk;25.2.9519653
        api-level: 34
        build-tools: 34.0.0
    
    - name: Setup NDK
      run: |
        echo "ANDROID_NDK=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV
    
    - name: Grant execute permission
      run: chmod +x gradlew
    
    - name: Clean project
      run: ./gradlew clean
    
    - name: Build Debug APK for ${{ matrix.arch }}
      if: github.event.inputs.debug == 'true' || github.event_name == 'push'
      run: |
        ./gradlew assembleDebug \
          -Pandroid.injected.build.abi=${{ matrix.arch }} \
          --stacktrace --no-daemon
      continue-on-error: true
    
    - name: Build Release APK for ${{ matrix.arch }}
      if: github.event.inputs.release == 'true'
      run: |
        ./gradlew assembleRelease \
          -Pandroid.injected.build.abi=${{ matrix.arch }} \
          --stacktrace --no-daemon
      continue-on-error: true
    
    - name: Upload Debug APK
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: TerLinux-${{ matrix.arch }}-debug
        path: app/build/outputs/apk/debug/*.apk
        if-no-files-found: ignore
    
    - name: Upload Release APK
      if: always() && github.event.inputs.release == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: TerLinux-${{ matrix.arch }}-release
        path: app/build/outputs/apk/release/*.apk
        if-no-files-found: ignore

  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
    
    - name: Create Release
      uses: softprops/action-gh-release@v3
      with:
        files: artifacts/**/*.apk
        generate_release_notes: true
        name: TerLinux ${{ github.ref_name }}
        tag_name: ${{ github.ref_name }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    needs: [build, create-release]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Check status
      run: |
        if [ "${{ needs.build.result }}" == "success" ]; then
          echo "✅ Build completed successfully!"
        else
          echo "❌ Build failed!"
          exit 1
        fi
